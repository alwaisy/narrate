## Important Guidelines

**DO:**
✅ Use `# Build & Test`, `# Architecture Overview`, etc.
✅ Include EXACT commands from package.json in backticks
✅ Focus on "big picture" architecture requiring reading multiple files
✅ Capture non-obvious patterns and conventions
✅ Reference existing docs with links instead of duplicating
✅ Be specific and actionable
✅ Include project-specific workflows and gotchas
✅ Keep it concise (140-200 lines recommended)

**DO NOT:**
❌ Repeat information easily discoverable from README
❌ Include generic advice ("write clean code", "add tests")
❌ List every component or file structure
❌ Make up information not based on actual analysis
❌ Include obvious best practices
❌ Add fluff - agents need signal, not noise
❌ Create sections like "Common Development Tasks" unless actually in project docs
❌ Include "Tips for Development" or generic sections

## Special Instructions

If $ARGUMENTS contains "overwrite", replace existing GEMINI.md entirely.
