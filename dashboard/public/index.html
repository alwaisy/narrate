<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .editor-textarea {
            field-sizing: content;
            min-height: 400px;
            line-height: 1.6;
        }
        #report-content h1 {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e5e7eb;
        }
        #report-content h2 {
            font-size: 0.75rem;
            font-weight: 700;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
        }
        #report-content h3 {
            font-size: 0.75rem;
            font-weight: 600;
            color: #4b5563;
            margin-top: 1rem;
            margin-bottom: 0.375rem;
        }
        #report-content p {
            font-size: 0.8125rem;
            color: #374151;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }
        #report-content ul, #report-content ol {
            font-size: 0.8125rem;
            color: #374151;
            padding-left: 1rem;
            margin-bottom: 0.5rem;
        }
        #report-content li {
            margin-bottom: 0.25rem;
            line-height: 1.5;
        }
        #report-content li strong {
            font-weight: 600;
            color: #1f2937;
        }
        #report-content code {
            font-size: 0.75rem;
            background: #f3f4f6;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            color: #6b7280;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        #report-content pre {
            font-size: 0.75rem;
            background: #f3f4f6;
            padding: 0.75rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 0.5rem;
        }
        #report-content pre code {
            background: none;
            padding: 0;
        }
        #report-content a {
            color: #0A66C2;
            text-decoration: underline;
            text-underline-offset: 2px;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: bottom;
        }
        #report-content hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 1rem 0;
        }
        #report-content blockquote {
            border-left: 3px solid #d1d5db;
            padding-left: 0.75rem;
            color: #6b7280;
            font-size: 0.8125rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-[21rem] bg-white border-r border-gray-200 flex flex-col h-full shadow-sm">
        <div class="p-6 border-b border-gray-100 bg-white sticky top-0 z-10">
            <a href="#/" class="block">
                <h1 class="text-xl font-bold flex items-center gap-2 mb-4">
                    <i class="ph-bold ph-linkedin-logo text-[#0A66C2]"></i>
                    Post Scout
                </h1>
            </a>
            <div class="relative">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="topic-filter" 
                    placeholder="Filter topics..." 
                    class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0A66C2] focus:border-transparent transition-all"
                >
            </div>
        </div>
        <div id="topic-list" class="flex-1 overflow-y-auto p-4 space-y-2">
            <!-- Topics will be injected here -->
        </div>

        <!-- Archive Toggle -->
        <div class="p-4 border-t border-gray-100 bg-gray-50">
            <button id="view-archive-btn" class="w-full py-3 px-4 rounded-lg border border-gray-200 text-xs font-bold uppercase tracking-widest text-gray-500 hover:bg-white hover:text-[#0A66C2] transition-all flex items-center justify-center gap-3">
                <i class="ph-bold ph-tray text-lg"></i>
                <span id="archive-btn-text">View Archives</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-white">
        <!-- Top Navigation -->
        <header id="current-topic-header" class="px-8 py-4 border-b border-gray-100 flex items-center justify-between">
            <div>
                <div class="flex items-baseline gap-3">
                    <h2 id="current-topic-title" class="text-xl font-bold text-gray-800 leading-tight">Post Scout Dashboard</h2>
                    <span id="current-topic-date" class="text-xs font-mono text-gray-400">Select a topic</span>
                </div>
                <div id="angle-tabs" class="flex gap-4 mt-2">
                    <!-- Angle tabs will be injected here -->
                </div>
            </div>
            <div class="flex gap-3 items-center">
                <button id="copy-to-linkedin-btn" class="px-4 py-2 text-sm font-medium text-white bg-[#0A66C2] rounded-lg hover:bg-[#004182] shadow-sm transition-all flex items-center gap-2 hidden">
                    <i class="ph ph-copy"></i> Copy to LinkedIn
                </button>
            </div>
        </header>

        <!-- Editor + Report Split View -->
        <div id="editor-view" class="flex-1 overflow-hidden flex bg-gray-50/50 hidden">

            <!-- Left: Post Editor -->
            <div class="flex-1 overflow-y-auto p-8 flex justify-center">
                <div id="editor-container" class="w-full max-w-2xl bg-white rounded-xl border border-gray-200 shadow-sm p-8 h-fit transition-all">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex gap-2 items-center">
                            <div id="post-status-badge"></div>
                            <span id="edit-indicator" class="px-2 py-1 bg-gray-100 text-gray-500 rounded text-[10px] font-bold uppercase tracking-wider">View Mode</span>
                        </div>
                        <div class="flex gap-1 bg-gray-100 p-1 rounded-lg" id="status-toggles"></div>
                    </div>
                    <textarea id="post-editor" 
                        readonly
                        class="w-full editor-textarea focus:outline-none text-lg text-gray-700 placeholder-gray-400 resize-none bg-transparent cursor-default"
                        placeholder="Press 'E' to edit..."></textarea>
                    <div id="modal-hint" class="mt-4 text-[10px] text-gray-400 uppercase tracking-widest flex justify-between">
                        <span>Press <kbd class="px-1 bg-gray-100 border rounded text-gray-600">E</kbd> to edit</span>
                        <span class="hidden" id="save-hint">Press <kbd class="px-1 bg-gray-100 border rounded text-gray-600">ESC</kbd> to save & exit</span>
                    </div>
                </div>
            </div>

            <!-- Right: Report Panel -->
            <div id="report-panel" class="w-[32rem] border-l border-gray-200 bg-white overflow-y-auto hidden">
                <div class="p-6">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="ph-bold ph-file-text text-[#0A66C2]"></i>
                        <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wider">Session Report</h3>
                    </div>
                    <div id="report-content"></div>
                </div>
            </div>

            <!-- Right: No Report Placeholder -->
            <div id="report-empty" class="w-[32rem] border-l border-gray-200 bg-gray-50/80 flex items-center justify-center hidden">
                <div class="text-center text-gray-400 p-6">
                    <i class="ph ph-file-dashed text-4xl mb-3 block"></i>
                    <p class="text-xs font-medium">No report found for this topic</p>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-view" class="flex-1 flex flex-col items-center justify-center bg-gray-50/50 text-gray-400">
            <i class="ph ph-selection-all text-6xl mb-4"></i>
            <p class="text-sm font-medium">Select a topic from the sidebar to begin</p>
        </div>

        <!-- Footer / Feedback -->
        <footer class="px-8 py-3 bg-white border-t border-gray-100 flex items-center justify-between text-xs text-gray-400">
            <div id="save-status">Ready</div>
            <div>Post Management System v2.0</div>
        </footer>
    </main>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
